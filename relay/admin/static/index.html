<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inkglass Admin</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="app">
  <div class="topbar">
    <h1>Inkglass Admin</h1>
    <div class="tabs">
      <button class="tab-btn active" data-tab="workshop">Library Workshop</button>
      <button class="tab-btn" data-tab="rp-tester">RP Tester</button>
    </div>
  </div>

  <!-- Workshop Tab -->
  <div id="tab-workshop" class="tab-panel active">
    <div class="workshop">
      <div class="workshop-sidebar">
        <div class="sidebar-controls">
          <select id="ws-content-type">
            <option value="">Content type...</option>
          </select>
          <select id="ws-world">
            <option value="">World...</option>
          </select>
          <button class="btn btn-primary btn-sm" id="ws-new-btn" style="width:100%">+ New</button>
        </div>
        <div class="sidebar-list" id="ws-file-list"></div>
      </div>
      <div class="workshop-editor">
        <div class="editor-toolbar">
          <span id="ws-editor-title" style="font-weight:600;font-size:0.9rem">Select a file</span>
          <div style="margin-left:auto;display:flex;gap:0.5rem;align-items:center">
            <div class="editor-mode-toggle">
              <button class="mode-btn active" data-mode="form">Form</button>
              <button class="mode-btn" data-mode="json">JSON</button>
            </div>
            <button class="btn btn-outline btn-sm" id="ws-validate-btn" disabled>Validate</button>
            <button class="btn btn-primary btn-sm" id="ws-save-btn" disabled>Save</button>
            <button class="btn btn-danger btn-sm" id="ws-delete-btn" disabled>Delete</button>
          </div>
        </div>
        <div class="editor-content" id="ws-editor-content">
          <div class="empty-state">Select a content type and world, then pick or create a file.</div>
        </div>
      </div>
    </div>
  </div>

  <!-- RP Tester Tab -->
  <div id="tab-rp-tester" class="tab-panel">
    <div class="rp-tester">
      <div class="rp-sidebar">
        <h3 style="font-size:0.9rem;font-weight:600">Test Session</h3>
        <div>
          <label>World</label>
          <select id="rp-world"></select>
        </div>
        <div>
          <label>NPC</label>
          <select id="rp-npc"><option value="">Select world first</option></select>
        </div>
        <div>
          <label>Mode</label>
          <select id="rp-mode">
            <option value="rp">RP Mode</option>
            <option value="quickchat">Quick Chat</option>
          </select>
        </div>
        <button class="btn btn-primary" id="rp-connect-btn">Connect</button>
        <button class="btn btn-danger" id="rp-disconnect-btn" disabled>Disconnect</button>
        <div style="margin-top:auto;font-size:0.8rem;color:var(--text2)">
          <span class="status-dot disconnected" id="rp-status-dot"></span>
          <span id="rp-status-text">Disconnected</span>
        </div>
      </div>
      <div class="rp-chat">
        <div class="chat-messages" id="rp-messages">
          <div class="empty-state">Configure a test session and click Connect.</div>
        </div>
        <div class="chat-input-area">
          <textarea id="rp-input" rows="2" placeholder="Type your message..." disabled></textarea>
          <button class="btn btn-primary" id="rp-send-btn" disabled>Send</button>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="/static/app.js"></script>
</body>
</html>
